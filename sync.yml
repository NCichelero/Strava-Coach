name: Strava Coach Dashboard

on:
  schedule:
    - cron: '57 11 * * *'   # 08:57 BRT
    - cron: '57 14 * * *'   # 11:57 BRT
    - cron: '57 0 * * *'    # 21:57 BRT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Sync Intervals.icu
        run: python intervals_sync.py
        continue-on-error: true

      - name: Run Strava Coach
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python strava_coach.py

      - name: Generate Dashboard
        run: python dashboard_generator.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html data/ || true
          git diff --staged --quiet || git commit -m "chore: auto-update dashboard $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
