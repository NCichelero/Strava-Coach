name: Sync Strava Coach

on:
  schedule:
    - cron: '57 11 * * *'   # 08:57 BRT (UTC-3)
    - cron: '57 14 * * *'   # 11:57 BRT (UTC-3)
    - cron: '57 0 * * *'    # 21:57 BRT (UTC-3)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Create .env file
        run: |
          echo "CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}" > .env
          echo "INTERVALS_API_KEY=${{ secrets.INTERVALS_API_KEY }}" >> .env
          echo "STRAVA_CLIENT_ID=${{ secrets.STRAVA_CLIENT_ID }}" >> .env
          echo "STRAVA_CLIENT_SECRET=${{ secrets.STRAVA_CLIENT_SECRET }}" >> .env
          echo "STRAVA_REFRESH_TOKEN=${{ secrets.STRAVA_REFRESH_TOKEN }}" >> .env

      - name: Run Strava Coach
        run: python strava_coach.py

        - name: Sync Intervals.icu
          run: python intervals_sync.py
          continue-on-error: true

      - name: Generate Dashboard
        run: python dashboard_generator.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --staged --quiet; then
            echo "ℹ️ Nenhuma mudança"
          else
            git commit -m "Auto-update: $(TZ='America/Sao_Paulo' date +'%Y-%m-%d %H:%M BRT')"
            git push
          fi

      - name: Notify on Failure
        if: failure()
        run: echo "❌ Falha no sync"
