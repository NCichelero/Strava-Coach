name: Sync Strava Coach

on:
  schedule:
    # São Paulo (UTC-3) → converter para UTC
    # Fórmula: UTC = BRT + 3 horas
    
    # 09:00 BRT = 12:00 UTC
    - cron: '0 12 * * *'
    
    # 12:00 BRT = 15:00 UTC
    - cron: '0 15 * * *'
    
    # 22:00 BRT = 01:00 UTC (próximo dia)
    - cron: '0 1 * * *'
  
  # Permitir trigger manual
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      # Clone o repo com permissão de push
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      # Setup Python
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # Instalar dependência
      - run: pip install requests
      
      # Criar .env com credenciais do GitHub Secrets
      - name: Create .env file
        run: |
          echo "CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}" > .env
          echo "INTERVALS_API_KEY=${{ secrets.INTERVALS_API_KEY }}" >> .env
          echo "STRAVA_CLIENT_ID=${{ secrets.STRAVA_CLIENT_ID }}" >> .env
          echo "STRAVA_CLIENT_SECRET=${{ secrets.STRAVA_CLIENT_SECRET }}" >> .env
          echo "STRAVA_REFRESH_TOKEN=${{ secrets.STRAVA_REFRESH_TOKEN }}" >> .env
      
      # Rodar scripts
      - name: Run Strava Coach
        run: python strava_coach.py
      
      - name: Generate Dashboard
        run: python dashboard_generator.py
      
      # Git commit + push (só se houver mudanças)
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          
          if git diff --staged --quiet; then
            echo "ℹ️ Nenhuma mudança, pulando commit"
          else
            git commit -m "Auto-update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
      
      # Notificar no caso de erro
      - name: Notify on Failure
        if: failure()
        run: echo "❌ Workflow falhou em $(date -u +'%Y-%m-%d %H:%M UTC')"
