yaml
name: Sync Strava Coach

on:
  schedule:
    - cron: '0 12 * * *'   # 09:00 BRT (UTC-3)
    - cron: '0 18 * * *'   # 15:00 BRT
    - cron: '0 1 * * *'    # 22:00 BRT (do dia anterior em UTC)
  workflow_dispatch:        # Permite rodar manual

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Create .env file
        run: |
          echo "CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}" > .env
          echo "INTERVALS_API_KEY=${{ secrets.INTERVALS_API_KEY }}" >> .env
          echo "STRAVA_CLIENT_ID=${{ secrets.STRAVA_CLIENT_ID }}" >> .env
          echo "STRAVA_CLIENT_SECRET=${{ secrets.STRAVA_CLIENT_SECRET }}" >> .env
          echo "STRAVA_REFRESH_TOKEN=${{ secrets.STRAVA_REFRESH_TOKEN }}" >> .env
      
      - name: Run Strava Coach
        run: python strava_coach.py
        continue-on-error: false
      
      - name: Generate Dashboard
        run: python dashboard_generator.py
      
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "✅ Nada para commitar"
          else
            git commit -m "🤖 Auto-update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
